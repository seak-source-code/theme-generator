<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Theme Dev Tool</title>

<style>
:root {
  --bg: #000000;
  --panel: #0d1117;
  --border: #21262d;
  --card: #161b22;
  --text: #e6edf3;
  --muted: #7d8590;
  --accent: #58a6ff;
}

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  display: flex;
  height: 100vh;
}

/* LEFT */
.left {
  width: 260px;
  padding: 20px;
  border-right: 1px solid var(--border);
  background: var(--panel);
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: #000;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
}

.buttons {
  display: flex;
  gap: 8px;
}

button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: var(--accent);
  color: black;
  font-weight: 600;
}

/* RIGHT */
.right {
  flex: 1;
  display: flex;
}

.split {
  display: flex;
  width: 100%;
}

/* PREVIEW */
.preview-wrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}

.phone {
  width: 360px;
  height: 720px;
  background: #000;
  border-radius: 30px;
  padding: 15px;
  box-shadow: 0 0 0 6px #000;
}

.preview {
  width: 100%;
  overflow-y: auto;
}

/* BALANCE */
.balance-bg {
  background: var(--card);
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 10px;
}

/* ACCOUNT */
.account-card {
  background: var(--card);
  border-radius: 14px;
  padding: 15px;
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
}

.circle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #30363d;
}

/* GRID */
.row-2, .grid-3 {
  display: grid;
  gap: 10px;
}

.row-2 {
  grid-template-columns: 1fr 1fr;
}

.grid-3 {
  grid-template-columns: repeat(3, 1fr);
  margin-top: 10px;
}

.item {
  background: var(--card);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}

.item img {
  width: 26px;
}

.menu-name {
  font-size: 11px;
}

.icon-name {
  font-size: 8px;
  color: var(--muted);
  cursor: pointer;
  word-break: break-all;
}

/* EXTRA */
.extra-container {
  margin-top: 10px;
  background: var(--card);
  padding: 10px;
  border-radius: 12px;
}

.extra-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
}

.extra-item {
  min-width: 70px;
  background: #21262d;
  border-radius: 10px;
  padding: 8px;
  text-align: center;
}

/* JSON */
.json-panel {
  width: 420px;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: #000;
}

.json-header {
  padding: 10px;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
}

.json-panel pre {
  flex: 1;
  margin: 0;
  padding: 15px;
  font-family: monospace;
  color: #79c0ff;
  overflow: auto;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
  <h3>Theme Config</h3>

  <input id="themeKey" value="KID-HAMSTER"/>

  <select id="country">
    <option value="kh">KH</option>
    <option value="la">LA</option>
  </select>

  <select id="mode">
    <option value="da">Dark</option>
    <option value="li">Light</option>
  </select>

  <div class="buttons">
    <button onclick="copyJSON()">Copy JSON</button>
    <button onclick="download()">Download</button>
  </div>
</div>

<!-- RIGHT -->
<div class="right">
<div class="split">

<!-- PREVIEW -->
<div class="preview-wrapper">
<div class="phone">
<div class="preview">

<div class="balance-bg" id="balanceBg"></div>

<div class="account-card" id="accountCard"></div>

<div class="row-2">
<div class="item" id="payment"></div>
<div class="item" id="topup"></div>
</div>

<div class="grid-3">
<div class="item" id="card"></div>
<div class="item" id="scanqr"></div>
<div class="item" id="transfer"></div>
</div>

<div class="grid-3">
<div class="item" id="deposit"></div>
<div class="item" id="loan"></div>
<div class="item" id="quickcash"></div>
</div>

<div class="extra-container">
<div class="extra-row" id="extraRow"></div>
</div>

</div>
</div>
</div>

<!-- JSON -->
<div class="json-panel">
<div class="json-header">preview.json</div>
<pre id="json"></pre>
</div>

</div>
</div>

</div>

<script>
function renderItem(el, label, file){
  el.innerHTML = `
    <img src="${file}" onerror="this.style.display='none'">
    <div class="menu-name">${label}</div>
    <div class="icon-name" onclick="copyText('${file}', this)">
      ${file}
    </div>
  `;
}

function generate(){
  const theme = document.getElementById("themeKey").value.toLowerCase();
  const country = document.getElementById("country").value;
  const mode = document.getElementById("mode").value;

  const prefix = country==="kh"?"abc":"abl";
  const icon = (n)=>`ic-${n}-${theme}-${country}-${mode}.png`;

  const data = {
    themeKey: theme,
    thumbnail: `${prefix}-${theme}.png`,
    backgroundImage: `bg-${theme}-${country}-${mode}.png`,
    balanceBgImage: `bgbl-${theme}-${country}-${mode}.png`,
    eventBalaneImageInside: `evbl-${theme}-${country}-${mode}.png`,
    appearanceImage: `appear-${theme}-${country}-${mode}.png`,
    qrScanImageButton: `qr-${theme}-${country}-${mode}.png`,
    mainMenu:{},
    extraMenu:{}
  };

  document.getElementById("balanceBg").innerHTML =
    `<div class="icon-name" onclick="copyText('${data.balanceBgImage}', this)">
      ${data.balanceBgImage}
    </div>`;

  const acc = icon("acc");
  document.getElementById("accountCard").innerHTML =
    `<div class="circle"></div>
     <div>
       <h3>Accounts</h3>
       <div class="icon-name" onclick="copyText('${acc}', this)">
         ${acc}
       </div>
     </div>`;

  const main = ["payment","topup","card","scanqr","transfer","deposit","loan","quickcash"];
  main.forEach(k=>{
    const f = icon(k);
    data.mainMenu[k]=f;
    renderItem(document.getElementById(k), k, f);
  });

  const extra = ["exgrate","publicservice","csx","promotion","location","invitefri","security","payme","acsmry","trade","acpay","merchant"];
  const row = document.getElementById("extraRow");
  row.innerHTML="";

  extra.forEach(k=>{
    const f = icon(k);
    data.extraMenu[k]=f;
    const div = document.createElement("div");
    div.className="extra-item";
    renderItem(div, k, f);
    row.appendChild(div);
  });

  document.getElementById("json").textContent =
    JSON.stringify(data,null,2);
}

function copyText(t,el){
  navigator.clipboard.writeText(t);
  el.innerText="✓";
  setTimeout(()=>el.innerText=t,800);
}

["themeKey","country","mode"].forEach(id=>{
  document.getElementById(id).addEventListener("input",generate);
});

generate();

function copyJSON(){
  navigator.clipboard.writeText(document.getElementById("json").innerText);
}

function download(){
  const blob=new Blob([document.getElementById("json").innerText]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="theme.json";
  a.click();
}
</script>

</body>
</html>
