<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Theme DevKit</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#000;
  color:#e6edf3;
}

.container {
  display:flex;
  height:100vh;
}

.col {
  flex:1;
  display:flex;
  flex-direction:column;
  border-right:1px solid #21262d;
}

.col:last-child { border-right:none; }

.header {
  padding:12px;
  font-weight:600;
  border-bottom:1px solid #21262d;
  background:#0d1117;
}

.content {
  padding:12px;
  overflow:auto;
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* FORM */
.form-group {
  width:100%;
  max-width:320px;
  margin-bottom:10px;
}

label {
  font-size:12px;
  color:#7d8590;
  margin-bottom:4px;
  display:block;
}

input, select {
  width:100%;
  padding:10px;
  background:#000;
  border:1px solid #21262d;
  color:#fff;
  border-radius:6px;
  box-sizing:border-box;
}

button {
  width:100%;
  max-width:320px;
  padding:10px;
  margin-top:12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#58a6ff;
}

/* JSON */
pre {
  margin:0;
  font-family:monospace;
  color:#79c0ff;
}

/* SEARCH */
.result-item {
  width:100%;
  max-width:320px;
  padding:8px;
  border-bottom:1px solid #21262d;
}

.key { color:#ffa657; cursor:pointer; }
.value { color:#79c0ff; cursor:pointer; }

/* DROPDOWN */
.dropdown {
  width:100%;
  max-width:320px;
  border:1px solid #21262d;
  max-height:150px;
  overflow:auto;
  background:#0d1117;
}

.dropdown-item {
  padding:8px;
  cursor:pointer;
  font-size:12px;
}

.dropdown-item:hover {
  background:#161b22;
}

/* DROP ZONE */
#dropZone {
  width:100%;
  max-width:320px;
  border:2px dashed #30363d;
  padding:20px;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}

/* PREVIEW */
#preview {
  max-width:320px;
  margin-top:10px;
  display:none;
}

/* OUTPUT */
#fileNamePreview {
  max-width:320px;
  word-break:break-all;
  color:#79c0ff;
}
</style>
</head>

<body>

<div class="container">

<!-- GENERATOR -->
<div class="col">
  <div class="header">Theme Generator</div>
  <div class="content">

    <div class="form-group">
      <label>Theme Key</label>
      <input id="themeKey" value="kid-hamster"/>
    </div>

    <div class="form-group">
      <label>Country</label>
      <select id="country">
        <option value="kh">KH</option>
        <option value="la">LA</option>
      </select>
    </div>

    <div class="form-group">
      <label>Appearance Mode</label>
      <select id="mode">
        <option value="da">Dark</option>
        <option value="li">Light</option>
      </select>
    </div>

    <button onclick="copyFullJSON()">Copy Full JSON</button>

  </div>
</div>

<!-- JSON -->
<div class="col">
  <div class="header">JSON Preview</div>
  <div class="content">
    <pre id="json"></pre>
  </div>
</div>

<!-- SEARCH -->
<div class="col">
  <div class="header">Search</div>
  <div class="content">
    <div class="form-group">
      <input id="search" placeholder="search key..." />
    </div>
    <div id="result"></div>
  </div>
</div>

<!-- ASSET TOOL -->
<div class="col">
  <div class="header">Image Rename Tool</div>
  <div class="content">

    <div class="form-group">
      <label>Search Key</label>
      <input id="assetKeyInput" placeholder="type key..." />
    </div>

    <div id="keySuggestions" class="dropdown"></div>

    <div class="form-group">
      <label>Upload Image</label>
      <div id="dropZone">Drag & Drop or Click</div>
    </div>

    <input type="file" id="fileInput" hidden />

    <img id="preview"/>

    <div style="font-size:12px;margin-top:10px;">Output name:</div>
    <div id="fileNamePreview"></div>

    <button onclick="downloadFile()">Download</button>

  </div>
</div>

</div>

<script>
let data={}, flat={}, uploadedFile=null, selectedKeyPath="";

/* GENERATE */
function generate(){
  const t=themeKey.value.toLowerCase(),c=country.value,m=mode.value;
  const prefix=c==="kh"?"abc":"abl";
  const icon=n=>`ic-${n}-${t}-${c}-${m}.png`;

  data={
    themeKey:t,
    thumbnail:`${prefix}-${t}.png`,
    backgroundImage:`bg-${t}-${c}-${m}.png`,
    balanceBgImage:`bgbl-${t}-${c}-${m}.png`,
    eventBalanceImageInside:`evbl-${t}-${c}-${m}.png`,
    appearanceImage:`appear-${t}-${c}-${m}.png`,
    qrScanImageButton:`qr-${t}-${c}-${m}.png`,
    mainMenu:{account:icon("acc"),payment:icon("payment"),topup:icon("topup"),card:icon("card"),scanqr:icon("scanqr"),transfer:icon("transfer"),deposit:icon("deposit"),loan:icon("loan"),faqs:icon("faqs"),quickcash:icon("quickcash")},
    extraMenu:{exgrate:icon("exgrate"),publicservice:icon("publicservice"),csx:icon("csx"),promotion:icon("promotion"),location:icon("location"),invitefri:icon("invitefri"),security:icon("security"),payme:icon("payme"),acsmry:icon("acsmry"),trade:icon("trade"),acpay:icon("acpay"),merchant:icon("merchant")}
  };

  flat=flatten(data);
  json.textContent=JSON.stringify(data,null,2);
}

function flatten(o,p=''){
  let r={};
  for(let k in o){
    let key=p?`${p}.${k}`:k;
    typeof o[k]==='object'?Object.assign(r,flatten(o[k],key)):r[key]=o[k];
  }
  return r;
}

/* SEARCH */
search.oninput=()=>{
  result.innerHTML="";
  Object.entries(flat)
    .filter(([k])=>k.includes(search.value))
    .forEach(([k,v])=>{
      const d=document.createElement("div");
      d.className="result-item";
      d.innerHTML=`<div class="key">${k}</div><div class="value">${v}</div>`;
      d.onclick=()=>copy(v);
      d.querySelector(".key").onclick=e=>{e.stopPropagation();copy(k)};
      result.appendChild(d);
    });
};

/* ASSET SEARCH */
assetKeyInput.oninput=()=>{
  keySuggestions.innerHTML="";
  Object.keys(flat)
    .filter(k=>k.includes(assetKeyInput.value))
    .forEach(k=>{
      const d=document.createElement("div");
      d.className="dropdown-item";
      d.innerText=k;
      d.onclick=()=>{
        selectedKeyPath=k;
        assetKeyInput.value=k;
        keySuggestions.innerHTML="";
        updateFileName();
      };
      keySuggestions.appendChild(d);
    });
};

assetKeyInput.onkeydown=e=>{
  if(e.key==="Enter"){
    const k=Object.keys(flat).find(k=>k.includes(assetKeyInput.value));
    if(k){selectedKeyPath=k;assetKeyInput.value=k;keySuggestions.innerHTML="";updateFileName();}
  }
};

/* FILE */
dropZone.onclick=()=>fileInput.click();

function handleFile(f){
  uploadedFile=f;
  const r=new FileReader();
  r.onload=e=>{preview.src=e.target.result;preview.style.display="block"};
  r.readAsDataURL(f);
  updateFileName();
}

fileInput.onchange=e=>handleFile(e.target.files[0]);
dropZone.ondrop=e=>{e.preventDefault();handleFile(e.dataTransfer.files[0])};
dropZone.ondragover=e=>e.preventDefault();

/* FILENAME */
function updateFileName(){
  if(!uploadedFile||!selectedKeyPath)return;
  const key=selectedKeyPath.split(".").pop();
  const t=themeKey.value.toLowerCase(),c=country.value,m=mode.value;

  const name=key==="thumbnail"
    ?`${c==="kh"?"abc":"abl"}-${t}.png`
    :key==="backgroundImage"
    ?`bg-${t}-${c}-${m}.png`
    :key==="balanceBgImage"
    ?`bgbl-${t}-${c}-${m}.png`
    :key==="eventBalanceImageInside"
    ?`evbl-${t}-${c}-${m}.png`
    :key==="appearanceImage"
    ?`appear-${t}-${c}-${m}.png`
    :key==="qrScanImageButton"
    ?`qr-${t}-${c}-${m}.png`
    :`ic-${key}-${t}-${c}-${m}.png`;

  fileNamePreview.innerText=name;
}

function downloadFile(){
  if(!uploadedFile)return alert("upload first");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(uploadedFile);
  a.download=fileNamePreview.innerText;
  a.click();
}

/* COPY */
function copy(t){navigator.clipboard.writeText(t)}
function copyFullJSON(){copy(JSON.stringify(data,null,2))}

/* INIT */
["themeKey","country","mode"].forEach(id=>document.getElementById(id).oninput=generate);
generate();
</script>

</body>
</html>
