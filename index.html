<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Theme Dev Tool</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#000;
  color:#e6edf3;
}

.container {
  display:flex;
  height:100vh;
}

.col {
  flex:1;
  display:flex;
  flex-direction:column;
  border-right:1px solid #21262d;
}

.col:last-child { border-right:none; }

.header {
  padding:12px;
  font-weight:600;
  border-bottom:1px solid #21262d;
  background:#0d1117;
}

.content {
  padding:12px;
  overflow:auto;
  flex:1;
}

/* INPUT */
label {
  font-size:12px;
  color:#7d8590;
  display:block;
  margin-top:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:4px;
  background:#000;
  border:1px solid #21262d;
  color:#fff;
  border-radius:6px;
}

button {
  width:100%;
  padding:10px;
  margin-top:12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#58a6ff;
}

/* JSON */
pre {
  margin:0;
  font-family:monospace;
  color:#79c0ff;
  line-height:1.5;
}

.highlight {
  background:rgba(255,255,0,0.2);
}

/* SEARCH */
.result-item {
  padding:8px;
  border-bottom:1px solid #21262d;
}

.result-item:hover {
  background:#111;
}

.key {
  color:#ffa657;
  cursor:pointer;
}

.value {
  color:#79c0ff;
  cursor:pointer;
}

.key:hover { color:#ffb86c; }
.value:hover { color:#58a6ff; }
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="col">
  <div class="header">Generate Theme</div>
  <div class="content">

    <label>Theme Key</label>
    <input id="themeKey" value="kid-hamster"/>

    <label>Country</label>
    <select id="country">
      <option value="kh">KH</option>
      <option value="la">LA</option>
    </select>

    <label>Appearance Mode</label>
    <select id="mode">
      <option value="da">Dark</option>
      <option value="li">Light</option>
    </select>

    <button onclick="copyFullJSON()">Copy Full JSON</button>

  </div>
</div>

<!-- MIDDLE -->
<div class="col">
  <div class="header">JSON Preview</div>
  <div class="content">
    <pre id="json"></pre>
  </div>
</div>

<!-- RIGHT -->
<div class="col">
  <div class="header">Search Key</div>
  <div class="content">

    <input id="search" placeholder="search key..." />
    <div id="result"></div>

  </div>
</div>

</div>

<script>
let data = {};
let flat = {};

/* GENERATE */
function generate(){
  const theme = themeKey.value.toLowerCase();
  const country = countryEl.value;
  const mode = modeEl.value;

  const prefix = country === "kh" ? "abc" : "abl";
  const icon = (n)=>`ic-${n}-${theme}-${country}-${mode}.png`;

  data = {
    themeKey: theme,
    thumbnail: `${prefix}-${theme}.png`,
    backgroundImage: `bg-${theme}-${country}-${mode}.png`,
    balanceBgImage: `bgbl-${theme}-${country}-${mode}.png`,
    eventBalanceImageInside: `evbl-${theme}-${country}-${mode}.png`,
    appearanceImage: `appear-${theme}-${country}-${mode}.png`,
    qrScanImageButton: `qr-${theme}-${country}-${mode}.png`,
    mainMenu: {
      account: icon("acc"),
      payment: icon("payment"),
      topup: icon("topup"),
      card: icon("card"),
      scanqr: icon("scanqr"),
      transfer: icon("transfer"),
      deposit: icon("deposit"),
      loan: icon("loan"),
      faqs: icon("faqs"),
      quickcash: icon("quickcash")
    },
    extraMenu: {
      exgrate: icon("exgrate"),
      publicservice: icon("publicservice"),
      csx: icon("csx"),
      promotion: icon("promotion"),
      location: icon("location"),
      invitefri: icon("invitefri"),
      security: icon("security"),
      payme: icon("payme"),
      acsmry: icon("acsmry"),
      trade: icon("trade"),
      acpay: icon("acpay"),
      merchant: icon("merchant")
    }
  };

  flat = flatten(data);
  renderJSON();
}

/* FLATTEN */
function flatten(obj, prefix=''){
  let res = {};
  for(let k in obj){
    const key = prefix ? `${prefix}.${k}` : k;
    if(typeof obj[k] === 'object'){
      Object.assign(res, flatten(obj[k], key));
    } else {
      res[key] = obj[k];
    }
  }
  return res;
}

/* RENDER JSON */
function renderJSON(highlightKey=""){
  const jsonEl = document.getElementById("json");
  const jsonString = JSON.stringify(data, null, 2);

  if(!highlightKey){
    jsonEl.textContent = jsonString;
    return;
  }

  const keyName = highlightKey.split(".").pop();

  const highlighted = jsonString.replace(
    new RegExp(`"${keyName}"\\s*:\\s*"([^"]+)"`),
    `<span class="highlight">"${keyName}": "$1"</span>`
  );

  jsonEl.innerHTML = highlighted;
}

/* SEARCH */
search.oninput = () => {
  const q = search.value.toLowerCase();
  const resultBox = document.getElementById("result");

  if(!q){
    resultBox.innerHTML = "";
    renderJSON();
    return;
  }

  const results = Object.entries(flat).filter(([k]) =>
    k.toLowerCase().includes(q)
  );

  if(results.length === 0){
    resultBox.innerHTML = "No result";
    return;
  }

  resultBox.innerHTML = "";

  results.forEach(([k,v]) => {
    const item = document.createElement("div");
    item.className = "result-item";

    const keyEl = document.createElement("div");
    keyEl.className = "key";
    keyEl.textContent = k;

    const valueEl = document.createElement("div");
    valueEl.className = "value";
    valueEl.textContent = v;

    keyEl.onclick = () => copy(k);
    valueEl.onclick = () => copy(v);

    item.onclick = () => renderJSON(k);

    item.appendChild(keyEl);
    item.appendChild(valueEl);
    resultBox.appendChild(item);
  });
};

/* COPY */
function copy(text){
  navigator.clipboard.writeText(text);
}

/* FULL JSON */
function copyFullJSON(){
  navigator.clipboard.writeText(JSON.stringify(data,null,2));
}

/* INIT */
const themeKey = document.getElementById("themeKey");
const countryEl = document.getElementById("country");
const modeEl = document.getElementById("mode");

["themeKey","country","mode"].forEach(id=>{
  document.getElementById(id).oninput = generate;
});

generate();
</script>

</body>
</html>
