<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Theme JSON Generator • Dev Tool</title>

<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
  }

  header {
    padding: 12px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    font-weight: bold;
  }

  .layout {
    display: flex;
    height: calc(100vh - 50px);
  }

  .left {
    width: 320px;
    padding: 20px;
    border-right: 1px solid #30363d;
    background: #0d1117;
  }

  .right {
    flex: 1;
    padding: 20px;
    overflow: auto;
  }

  label {
    font-size: 12px;
    opacity: 0.7;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0 12px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #161b22;
    color: white;
  }

  .buttons {
    display: flex;
    gap: 8px;
  }

  button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }

  .copy { background: #238636; color: white; }
  .download { background: #1f6feb; color: white; }

  pre {
    margin: 0;
    border-radius: 10px;
    padding: 20px;
    background: #0d1117;
    font-size: 13px;
  }

  .tag {
    font-size: 11px;
    background: #30363d;
    padding: 4px 8px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 10px;
  }
</style>
</head>

<body>

<header>🧑‍💻 Theme JSON Generator • Developer Tool</header>

<div class="layout">

  <!-- LEFT PANEL -->
  <div class="left">

    <label>Theme Key</label>
    <input id="themeKey" value="KID-HAMSTER" />

    <label>Country</label>
    <select id="country">
      <option value="kh">KH</option>
      <option value="la">LA</option>
    </select>

    <label>Mode</label>
    <select id="mode">
      <option value="da">Dark</option>
      <option value="li">Light</option>
    </select>

    <div class="buttons">
      <button class="copy" onclick="copyJSON()">Copy</button>
      <button class="download" onclick="download()">Download</button>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="tag">preview.json</div>
    <pre><code id="code" class="json"></code></pre>
  </div>

</div>

<script>
let currentJSON = "";

function generate() {
  const themeKey = document.getElementById("themeKey").value.trim();
  const country = document.getElementById("country").value;
  const mode = document.getElementById("mode").value;

  const theme = themeKey.toLowerCase();
  const prefix = country === "kh" ? "abc" : "abl";

  const menu = (name) => `ic-${name}-${theme}-${country}-${mode}.png`;

  const data = {
    themeKey,
    thumbnail: `${prefix}-${theme}.png`,
    backgroundImage: `bg-${theme}-${country}-${mode}.png`,
    balanceBgImage: `bgbl-${theme}-${country}-${mode}.png`,
    eventBalaneImageInside: `evbl-${theme}-${country}-${mode}.png`,
    appearanceImage: `appear-${theme}-${country}-${mode}.png`,
    qrScanImageButton: `qr-${theme}-${country}-${mode}.png`,
    mainMenu: {
      account: menu("acc"),
      payment: menu("payment"),
      topup: menu("topup"),
      card: menu("card"),
      scanqr: menu("scanqr"),
      transfer: menu("transfer"),
      deposit: menu("deposit"),
      loan: menu("loan"),
      faqs: menu("faqs"),
      quickcash: menu("quickcash")
    },
    extraMenu: {
      exgrate: menu("exgrate"),
      publicservice: menu("publicservice"),
      csx: menu("csx"),
      promotion: menu("promotion"),
      location: menu("location"),
      invitefri: menu("invitefri"),
      security: menu("security"),
      payme: menu("payme"),
      acsmry: menu("acsmry"),
      trade: menu("trade"),
      acpay: menu("acpay"),
      merchant: menu("merchant")
    }
  };

  currentJSON = JSON.stringify(data, null, 2);

  const codeBlock = document.getElementById("code");
  codeBlock.textContent = currentJSON;

  hljs.highlightElement(codeBlock);
}

// Live update (no button needed)
["themeKey", "country", "mode"].forEach(id => {
  document.getElementById(id).addEventListener("input", generate);
});

// Init
generate();

function copyJSON() {
  navigator.clipboard.writeText(currentJSON);
}

function download() {
  const blob = new Blob([currentJSON], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "theme.json";
  a.click();
}
</script>

</body>
</html>
