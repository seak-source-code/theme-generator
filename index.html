<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Theme JSON Generator</title>

<!-- Highlight.js (code style) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f172a;
    color: #fff;
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 900px;
    margin: auto;
  }

  h1 {
    text-align: center;
  }

  .card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: none;
    background: #334155;
    color: white;
  }

  .row {
    display: flex;
    gap: 10px;
  }

  button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }

  .generate { background: #22c55e; }
  .copy { background: #3b82f6; }
  .download { background: #f59e0b; }

  pre {
    border-radius: 10px;
    padding: 15px;
    overflow-x: auto;
  }
</style>
</head>

<body>

<div class="container">
  <h1>🎨 Theme JSON Generator</h1>

  <div class="card">
    <input id="themeKey" value="KID-HAMSTER" />

    <div class="row">
      <select id="country">
        <option value="kh">KH</option>
        <option value="la">LA</option>
      </select>

      <select id="mode">
        <option value="da">Dark</option>
        <option value="li">Light</option>
      </select>
    </div>

    <div class="row">
      <button class="generate" onclick="generate()">Generate</button>
      <button class="copy" onclick="copyJSON()">Copy</button>
      <button class="download" onclick="download()">Download</button>
    </div>
  </div>

  <div class="card">
    <pre><code id="code" class="json"></code></pre>
  </div>
</div>

<script>
let currentJSON = "";

function generate() {
  const themeKey = document.getElementById("themeKey").value.trim();
  const country = document.getElementById("country").value;
  const mode = document.getElementById("mode").value;

  const theme = themeKey.toLowerCase();
  const prefix = country === "kh" ? "abc" : "abl";

  const menu = (name) => `ic-${name}-${theme}-${country}-${mode}.png`;

  const data = {
    themeKey,
    thumbnail: `${prefix}-${theme}.png`,
    backgroundImage: `bg-${theme}-${country}-${mode}.png`,
    balanceBgImage: `bgbl-${theme}-${country}-${mode}.png`,
    eventBalaneImageInside: `evbl-${theme}-${country}-${mode}.png`,
    appearanceImage: `appear-${theme}-${country}-${mode}.png`,
    qrScanImageButton: `qr-${theme}-${country}-${mode}.png`,
    mainMenu: {
      account: menu("acc"),
      payment: menu("payment"),
      topup: menu("topup"),
      card: menu("card"),
      scanqr: menu("scanqr"),
      transfer: menu("transfer"),
      deposit: menu("deposit"),
      loan: menu("loan"),
      faqs: menu("faqs"),
      quickcash: menu("quickcash")
    },
    extraMenu: {
      exgrate: menu("exgrate"),
      publicservice: menu("publicservice"),
      csx: menu("csx"),
      promotion: menu("promotion"),
      location: menu("location"),
      invitefri: menu("invitefri"),
      security: menu("security"),
      payme: menu("payme"),
      acsmry: menu("acsmry"),
      trade: menu("trade"),
      acpay: menu("acpay"),
      merchant: menu("merchant")
    }
  };

  currentJSON = JSON.stringify(data, null, 2);

  const codeBlock = document.getElementById("code");
  codeBlock.textContent = currentJSON;

  hljs.highlightElement(codeBlock);
}

// Auto run
generate();

function copyJSON() {
  navigator.clipboard.writeText(currentJSON);
  alert("Copied!");
}

function download() {
  const blob = new Blob([currentJSON], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "theme.json";
  a.click();
}
</script>

</body>
</html>
