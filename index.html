<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Theme DevKit</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#000;
  color:#e6edf3;
}

.container {
  display:flex;
  height:100vh;
}

.col {
  flex:1;
  display:flex;
  flex-direction:column;
  border-right:1px solid #21262d;
}

.col:last-child { border-right:none; }

.header {
  padding:12px;
  font-weight:600;
  border-bottom:1px solid #21262d;
  background:#0d1117;
}

.content {
  padding:12px;
  overflow:auto;
  flex:1;
}

label {
  font-size:12px;
  color:#7d8590;
  display:block;
  margin-top:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:4px;
  background:#000;
  border:1px solid #21262d;
  color:#fff;
  border-radius:6px;
}

button {
  width:100%;
  padding:10px;
  margin-top:12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#58a6ff;
}

/* JSON */
pre {
  margin:0;
  font-family:monospace;
  color:#79c0ff;
  line-height:1.5;
}

.highlight {
  background:rgba(255,255,0,0.2);
}

/* SEARCH */
.result-item {
  padding:8px;
  border-bottom:1px solid #21262d;
}

.result-item:hover {
  background:#111;
}

.key {
  color:#ffa657;
  cursor:pointer;
}

.value {
  color:#79c0ff;
  cursor:pointer;
}

/* DROP ZONE */
#dropZone {
  border:2px dashed #30363d;
  border-radius:10px;
  padding:20px;
  text-align:center;
  color:#7d8590;
  margin-top:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- GENERATOR -->
<div class="col">
  <div class="header">Theme Generator</div>
  <div class="content">

    <label>Theme Key</label>
    <input id="themeKey" value="kid-hamster"/>

    <label>Country</label>
    <select id="country">
      <option value="kh">KH</option>
      <option value="la">LA</option>
    </select>

    <label>Appearance Mode</label>
    <select id="mode">
      <option value="da">Dark</option>
      <option value="li">Light</option>
    </select>

    <button onclick="copyFullJSON()">Copy Full JSON</button>

  </div>
</div>

<!-- JSON -->
<div class="col">
  <div class="header">JSON Preview</div>
  <div class="content">
    <pre id="json"></pre>
  </div>
</div>

<!-- SEARCH -->
<div class="col">
  <div class="header">Search Key</div>
  <div class="content">

    <input id="search" placeholder="search key..." />
    <div id="result"></div>

  </div>
</div>

<!-- ASSET TOOL -->
<div class="col">
  <div class="header">Image Rename Tool</div>
  <div class="content">

    <label>Select Key</label>
    <select id="assetKey"></select>

    <label>Upload Image</label>

    <div id="dropZone">
      Drag & Drop Image Here<br/>or Click to Upload
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none"/>

    <img id="preview" style="max-width:100%; margin-top:10px; display:none; border-radius:6px;" />

    <div style="margin-top:10px; font-size:12px; color:#7d8590;">
      Output name:
    </div>
    <div id="fileNamePreview" style="color:#79c0ff;"></div>

    <button onclick="downloadFile()">Download Renamed</button>

  </div>
</div>

</div>

<script>
let data = {}, flat = {}, uploadedFile = null;

/* GENERATE */
function generate(){
  const theme = themeKey.value.toLowerCase();
  const country = countryEl.value;
  const mode = modeEl.value;

  const prefix = country === "kh" ? "abc" : "abl";
  const icon = (n)=>`ic-${n}-${theme}-${country}-${mode}.png`;

  data = {
    themeKey: theme,
    thumbnail: `${prefix}-${theme}.png`,
    backgroundImage: `bg-${theme}-${country}-${mode}.png`,
    balanceBgImage: `bgbl-${theme}-${country}-${mode}.png`,
    eventBalanceImageInside: `evbl-${theme}-${country}-${mode}.png`,
    appearanceImage: `appear-${theme}-${country}-${mode}.png`,
    qrScanImageButton: `qr-${theme}-${country}-${mode}.png`,
    mainMenu: {
      account: icon("acc"),
      payment: icon("payment"),
      topup: icon("topup"),
      card: icon("card"),
      scanqr: icon("scanqr"),
      transfer: icon("transfer"),
      deposit: icon("deposit"),
      loan: icon("loan"),
      faqs: icon("faqs"),
      quickcash: icon("quickcash")
    },
    extraMenu: {
      exgrate: icon("exgrate"),
      publicservice: icon("publicservice"),
      csx: icon("csx"),
      promotion: icon("promotion"),
      location: icon("location"),
      invitefri: icon("invitefri"),
      security: icon("security"),
      payme: icon("payme"),
      acsmry: icon("acsmry"),
      trade: icon("trade"),
      acpay: icon("acpay"),
      merchant: icon("merchant")
    }
  };

  flat = flatten(data);
  renderJSON();
  buildKeyOptions();
  updateFileName();
}

/* FLATTEN */
function flatten(obj, prefix=''){
  let res = {};
  for(let k in obj){
    const key = prefix ? `${prefix}.${k}` : k;
    if(typeof obj[k] === 'object'){
      Object.assign(res, flatten(obj[k], key));
    } else {
      res[key] = obj[k];
    }
  }
  return res;
}

/* JSON */
function renderJSON(highlightKey=""){
  const jsonEl = document.getElementById("json");
  const jsonString = JSON.stringify(data, null, 2);

  if(!highlightKey){
    jsonEl.textContent = jsonString;
    return;
  }

  const keyName = highlightKey.split(".").pop();

  jsonEl.innerHTML = jsonString.replace(
    new RegExp(`"${keyName}"\\s*:\\s*"([^"]+)"`),
    `<span class="highlight">"${keyName}": "$1"</span>`
  );
}

/* SEARCH */
search.oninput = () => {
  const q = search.value.toLowerCase();
  const resultBox = document.getElementById("result");

  if(!q){
    resultBox.innerHTML = "";
    renderJSON();
    return;
  }

  resultBox.innerHTML = "";

  Object.entries(flat)
    .filter(([k]) => k.toLowerCase().includes(q))
    .forEach(([k,v]) => {
      const item = document.createElement("div");
      item.className = "result-item";

      const keyEl = document.createElement("div");
      keyEl.className = "key";
      keyEl.textContent = k;

      const valueEl = document.createElement("div");
      valueEl.className = "value";
      valueEl.textContent = v;

      keyEl.onclick = () => copy(k);
      valueEl.onclick = () => copy(v);
      item.onclick = () => renderJSON(k);

      item.appendChild(keyEl);
      item.appendChild(valueEl);
      resultBox.appendChild(item);
    });
};

/* ASSET TOOL */
function buildKeyOptions(){
  const select = document.getElementById("assetKey");
  select.innerHTML = "";

  Object.keys(flat).forEach(k=>{
    const opt = document.createElement("option");
    opt.value = k;
    opt.textContent = k;
    select.appendChild(opt);
  });
}

function updateFileName(){
  if(!uploadedFile) return;

  const key = document.getElementById("assetKey").value.split(".").pop();
  const theme = themeKey.value.toLowerCase();
  const country = countryEl.value;
  const mode = modeEl.value;

  const name = key === "thumbnail"
    ? `${country==="kh"?"abc":"abl"}-${theme}.png`
    : key === "backgroundImage"
    ? `bg-${theme}-${country}-${mode}.png`
    : key === "balanceBgImage"
    ? `bgbl-${theme}-${country}-${mode}.png`
    : key === "eventBalanceImageInside"
    ? `evbl-${theme}-${country}-${mode}.png`
    : key === "appearanceImage"
    ? `appear-${theme}-${country}-${mode}.png`
    : key === "qrScanImageButton"
    ? `qr-${theme}-${country}-${mode}.png`
    : `ic-${key}-${theme}-${country}-${mode}.png`;

  document.getElementById("fileNamePreview").innerText = name;
}

/* DRAG + PREVIEW */
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

dropZone.onclick = () => fileInput.click();

function handleFile(file){
  uploadedFile = file;

  const reader = new FileReader();
  reader.onload = e=>{
    preview.src = e.target.result;
    preview.style.display = "block";
  };
  reader.readAsDataURL(file);

  updateFileName();
}

fileInput.onchange = e => handleFile(e.target.files[0]);

dropZone.ondragover = e => {
  e.preventDefault();
  dropZone.style.borderColor = "#58a6ff";
};

dropZone.ondragleave = () => {
  dropZone.style.borderColor = "#30363d";
};

dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.style.borderColor = "#30363d";
  handleFile(e.dataTransfer.files[0]);
};

document.getElementById("assetKey").onchange = updateFileName;

function downloadFile(){
  if(!uploadedFile) return alert("Upload file first");

  const name = document.getElementById("fileNamePreview").innerText;
  const link = document.createElement("a");
  link.href = URL.createObjectURL(uploadedFile);
  link.download = name;
  link.click();
}

/* COPY */
function copy(text){
  navigator.clipboard.writeText(text);
}

function copyFullJSON(){
  navigator.clipboard.writeText(JSON.stringify(data,null,2));
}

/* INIT */
const themeKey = document.getElementById("themeKey");
const countryEl = document.getElementById("country");
const modeEl = document.getElementById("mode");

["themeKey","country","mode"].forEach(id=>{
  document.getElementById(id).oninput = generate;
});

generate();
</script>

</body>
</html>
